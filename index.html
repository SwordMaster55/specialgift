<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pragya ❤️ Shivansh</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  /* 👉 Put your generated image in same folder and rename to bg.png or bg.jpg */
  background: url('bg.png') no-repeat center center/cover;
  position: relative;
}

/* Soft pink overlay */
body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 192, 203, 0.35);
  backdrop-filter: blur(6px);
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  color: #fff;

  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.2);
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

h1 {
  font-size: 40px;
}

p {
  margin-top: 10px;
  font-size: 18px;
}

button {
  margin: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  background: #ff4d6d;
  color: white;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 5px 15px rgba(255,0,100,0.4);
}

.play-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

</style>
</head>

<body>

<div class="card">
  <h1 id="title"></h1>
  <p>Happy 1 Year of Togetherness 💖</p>
  <p>A little surprise made with love, just to remind you how special you are to me ❤️</p>

  <button onclick="goToPage2()">Open Surprise 💌</button>
  <button onclick="celebrate()">Celebrate 🎉</button>
</div>

<button class="play-btn" onclick="playMusic()">🎵 Play Song</button>

<!-- Put your song file in same folder and rename properly -->
<audio id="song" src="song.mp3"></audio>

<script>

// Typewriter Effect
const text = "Pragya ❤️ Shivansh";
let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("title").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 100);
  }
}
typeWriter();

// Floating Hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}
setInterval(createHeart, 500);

// Redirect function
function goToPage2() {
  window.location.href = "page2.html";
}

// Celebrate effect
function celebrate() {
  document.getElementById('flame').style.display = 'none';
      burst();

    // random direction
    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 200 + 100;

    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;

    c.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
    ], {
      duration: 1200,
      easing: "ease-out"
    });

    setTimeout(() => c.remove(), 1200);
  }
// Play music
function playMusic() {
  const song = document.getElementById("song");
  song.play();
}

</script>

</body>
</html>
