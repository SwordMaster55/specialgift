<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pragya's Anniversary Surprise 💖</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Poppins', sans-serif;
      background: url('bg.png') center center / cover no-repeat fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255, 214, 231, 0.62);
      z-index: 0;
    }

    .wrap {
      width: min(92vw, 820px);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .card {
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 28px;
      padding: 30px 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.12);
    }

    .title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3rem, 8vw, 6rem);
      color: #c53d74;
      margin-bottom: 12px;
    }

    .sub {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      line-height: 1.8;
      color: #7a3555;
      margin-bottom: 24px;
    }

    .btns {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      background: linear-gradient(135deg, #ff6f91, #ff4f86);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(255,79,134,0.35);
      font-weight: 500;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.92);
      color: #c53d74;
    }

    .heart {
      position: absolute;
      pointer-events: none;
      animation: floatUp linear forwards;
      z-index: 1;
      opacity: 0.9;
    }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to { transform: translateY(-120vh) scale(1.3); opacity: 0; }
    }

    @media (max-width: 480px) {
      .card { padding: 24px 16px; }
      .btns { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Happy Anniversary!</div>
      <div class="sub">Pragya, this is a special surprise for you. Click to start the celebration.</div>

      <div class="btns">
        <button class="btn" onclick="location.href='page2.html'">Open Surprise 💌</button>
        <button class="btn secondary" onclick="celebrate()">Celebrate 🎉</button>
      </div>
    </div>
  </div>

  <script>
    function celebrate() {
      confetti({ 
        particleCount: 140, 
        spread: 100, 
        origin: { y: 0.65 } 
      });
    }

    function createHeart() {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = Math.random() > 0.5 ? '💖' : '💕';
      h.style.left = Math.random() * 100 + 'vw';
      h.style.bottom = '-30px';
      h.style.fontSize = (16 + Math.random() * 18) + 'px';
      h.style.animationDuration = (5 + Math.random() * 5) + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 10000);
    }

    setInterval(createHeart, 800);
  </script>
</body>
</html>
